<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKAM — The cabins.</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { background: var(--ink); }
  body { color: var(--cream); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  *::selection { background: var(--bindu); color: var(--cream); }

  /* ====== Sticky reserve bar — quiet, always there ====== */
  .bar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 50; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(20, 32, 26, 0.0);
    border-bottom: 1px solid transparent;
    color: var(--cream);
    transition: background 320ms, border-color 320ms, color 320ms, backdrop-filter 320ms;
  }
  .bar.is-light {
    background: rgba(250, 247, 240, 0.92);
    border-bottom: 1px solid var(--bone);
    color: var(--ink);
  }
  .bar__brand svg { height: 22px; display: block; }
  .bar__center {
    font-family: var(--font-editorial);
    font-style: italic; font-weight: 400;
    font-size: 14px;
    color: inherit;
    opacity: 0.6;
  }
  .bar__cta {
    background: transparent;
    color: var(--cream);
    border: 1px solid var(--cream);
    border-radius: 999px;
    padding: 8px 22px;
    font-family: var(--font-ui);
    font-size: 10.5px; letter-spacing: 2.5px;
    text-transform: uppercase; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: all 220ms;
  }
  .bar__cta .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--bindu);
  }
  .bar__cta:hover { background: var(--cream); color: var(--forest); }
  .bar.is-light .bar__cta { color: var(--forest); border-color: var(--bindu); }
  .bar.is-light .bar__cta:hover { background: var(--bindu); color: var(--cream); }

  /* ====== Cover ====== */
  .cover {
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 40px 64px;
    background: linear-gradient(180deg, #0c1410 0%, #14201A 40%, #1F3525 100%);
  }
  .cover__ridges {
    position: absolute; left: 0; right: 0; bottom: 0; height: 60%;
    z-index: 1; opacity: 0.7;
  }
  .cover__ridges svg { width: 100%; height: 100%; display: block; }
  .cover__light {
    position: absolute; right: 38%; bottom: 38%;
    width: 10px; height: 6px;
    background: #d68763;
    box-shadow: 0 0 32px 8px rgba(214,135,99,0.5);
    z-index: 2;
  }
  .cover__inner {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; gap: 18px;
    max-width: 900px;
  }
  .cover__eyebrow {
    font-family: var(--font-ui);
    font-size: 10.5px; letter-spacing: 4px;
    color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .cover__dev {
    font-family: var(--font-devanagari);
    font-size: 22px;
    color: var(--bindu);
    letter-spacing: 1.5px;
  }
  .cover__title {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 96px;
    line-height: 0.95;
    letter-spacing: 0;
    color: var(--cream);
    max-width: 720px;
  }
  .cover__title em {
    font-style: italic;
    font-weight: 400;
  }
  .cover__sub {
    font-family: var(--font-editorial);
    font-style: italic;
    font-weight: 300;
    font-size: 20px;
    color: var(--sage);
    line-height: 1.5;
    max-width: 540px;
    margin-top: 8px;
  }
  .cover__meta {
    margin-top: 16px;
    display: flex; gap: 18px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 3px;
    color: var(--moss-on-forest);
    text-transform: uppercase; font-weight: 500;
  }
  .cover__meta .pipe { color: rgba(138,148,118,0.4); }
  .cover__scroll {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 28px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 3px;
    color: var(--moss-on-forest);
    text-transform: uppercase; font-weight: 500;
    z-index: 5;
    text-align: center;
  }
  .cover__scroll span { display: block; }
  .cover__scroll::after {
    content: "";
    display: block;
    width: 1px; height: 22px;
    background: var(--bindu);
    margin: 8px auto 0;
  }

  /* ====== Each cabin — a hero panel + detail strip ====== */
  .cabin {
    background: var(--cream);
    color: var(--ink);
    position: relative;
  }

  .cabin__hero {
    height: 96vh;
    position: relative;
    overflow: hidden;
    display: flex; align-items: flex-end;
    padding: 0 40px 56px;
  }
  .cabin__bg {
    position: absolute; inset: 0;
  }
  /* Cabin A — edge cabin, dusk valley */
  .cabin--A .cabin__bg {
    background: linear-gradient(180deg, #14201A 0%, #1f3525 30%, #5a6655 75%, #a59f86 100%);
  }
  .cabin--A .cabin__bg::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 38%;
    background:
      radial-gradient(ellipse at 40% 90%, rgba(20,32,26,0.6) 0%, transparent 70%),
      linear-gradient(transparent, rgba(20,32,26,0.55));
  }
  /* Cabin B — forest canopy */
  .cabin--B .cabin__bg {
    background: linear-gradient(180deg, #14201A 0%, #1F3525 35%, #2B4630 65%, #4a5a44 100%);
  }
  .cabin--B .cabin__bg::after {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(74,90,68,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 70%, rgba(20,32,26,0.5) 0%, transparent 60%);
  }
  /* Warm window dot for cabin B */
  .cabin--B .cabin__bg::before {
    content: ""; position: absolute;
    right: 32%; top: 64%;
    width: 10px; height: 6px;
    background: #d68763;
    box-shadow: 0 0 24px 6px rgba(214,135,99,0.5);
  }
  /* Cabin C — alpine ridge */
  .cabin--C .cabin__bg {
    background: linear-gradient(180deg, #2a3845 0%, #6e7a82 35%, #b8a48c 70%, #4a4035 100%);
  }
  .cabin--C .cabin__bg::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 40%;
    background: linear-gradient(transparent, rgba(20,32,26,0.5));
  }
  /* Cabin D — pastoral valley, soft */
  .cabin--D .cabin__bg {
    background: linear-gradient(180deg, #36443a 0%, #5a6655 50%, #a59f86 100%);
  }
  .cabin--D .cabin__bg::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 40%;
    background: linear-gradient(transparent, rgba(20,32,26,0.4));
  }

  .cabin__hero-inner {
    position: relative; z-index: 5;
    max-width: 760px;
    color: var(--cream);
  }
  .cabin__num {
    font-family: var(--font-editorial);
    font-style: italic;
    font-size: 16px;
    color: var(--bindu);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .cabin__name {
    font-family: var(--font-display);
    font-weight: 300;
    font-style: italic;
    font-size: 68px;
    line-height: 1;
    color: var(--cream);
    letter-spacing: 0;
    margin-bottom: 16px;
  }
  .cabin__loc-meta {
    display: flex; gap: 18px;
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 3px;
    color: var(--sage);
    text-transform: uppercase; font-weight: 500;
    opacity: 0.85;
  }
  .cabin__loc-meta .pipe { color: rgba(201,214,188,0.4); }

  /* Detail strip — three small pictures + lines */
  .cabin__strip {
    background: var(--cream);
    padding: 80px 40px 80px;
  }
  .cabin__strip-inner {
    max-width: 1180px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
  }
  .frag {
    display: flex; flex-direction: column; gap: 14px;
  }
  .frag__img {
    aspect-ratio: 4 / 5;
    border-bottom: 1px solid var(--bone);
  }
  /* Generic atmospheric tiles per cabin */
  .frag--a1 { background: linear-gradient(180deg, #1f3525 0%, #2B4630 65%, #5a6655 100%); }
  .frag--a2 { background: linear-gradient(165deg, #a59f86 0%, #6b5e44 70%, #3a2c1e 100%); }
  .frag--a3 { background: linear-gradient(180deg, #14201A 0%, #2B4630 50%, #5a6655 100%); position: relative; }
  .frag--a3::after { content: ""; position: absolute; right: 35%; bottom: 30%; width: 8px; height: 5px; background: #d68763; box-shadow: 0 0 18px 5px rgba(214,135,99,0.55); }

  .frag--b1 { background: linear-gradient(195deg, #36443a 0%, #5a6655 45%, #a59f86 80%, #d9d3c1 100%); }
  .frag--b2 { background: linear-gradient(180deg, #14201A 0%, #1F3525 50%, #2B4630 100%); }
  .frag--b3 {
    background:
      radial-gradient(circle at 22% 28%, rgba(0,0,0,0.32) 1.5px, transparent 3px),
      radial-gradient(circle at 65% 70%, rgba(0,0,0,0.22) 1.2px, transparent 3px),
      radial-gradient(circle at 80% 25%, rgba(0,0,0,0.18) 1px, transparent 2.5px),
      linear-gradient(135deg, #9aa385 0%, #6e7a64 50%, #4a5040 100%);
  }

  .frag--c1 { background: linear-gradient(180deg, #2a3845 0%, #6e7a82 50%, #b8a48c 100%); }
  .frag--c2 { background: linear-gradient(160deg, #c8b89a 0%, #8a7d5e 50%, #3a2c1e 100%); }
  .frag--c3 { background: linear-gradient(180deg, #4a4035 0%, #806d4e 50%, #b8a48c 100%); }

  .frag__lbl {
    font-family: var(--font-ui);
    font-size: 10px; letter-spacing: 2.5px;
    color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .frag__line {
    font-family: var(--font-editorial);
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.45;
  }

  /* ====== Soft Reserve interlude after every cabin ====== */
  .interlude {
    background: var(--sand);
    padding: 56px 40px;
    text-align: center;
    border-top: 1px solid var(--bone);
    border-bottom: 1px solid var(--bone);
  }
  .interlude__line {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    color: var(--forest);
    margin-bottom: 18px;
    line-height: 1.3;
    max-width: 580px; margin-left: auto; margin-right: auto;
  }
  .interlude__cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 28px;
    border: 1px solid var(--bindu);
    border-radius: 999px;
    background: transparent;
    color: var(--forest);
    font-family: var(--font-ui);
    font-size: 11px; letter-spacing: 2.5px;
    text-transform: uppercase; font-weight: 500;
    cursor: pointer;
    transition: color 180ms;
  }
  .interlude__cta:hover { color: var(--bindu); }
  .interlude__cta .dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--bindu);
  }

  /* ====== Closing block ====== */
  .closing {
    background: var(--forest);
    color: var(--cream);
    padding: 120px 40px;
    text-align: center;
  }
  .closing__dev {
    font-family: var(--font-devanagari);
    font-size: 28px; color: var(--bindu);
    letter-spacing: 1.5px;
    margin-bottom: 18px;
  }
  .closing__title {
    font-family: var(--font-display);
    font-weight: 300;
    font-style: italic;
    font-size: 56px;
    color: var(--cream);
    line-height: 1.05;
    margin-bottom: 24px;
    max-width: 620px; margin-left: auto; margin-right: auto;
  }
  .closing__rule { width: 48px; height: 1px; background: var(--bindu); margin: 0 auto 32px; }
  .closing__cta {
    background: var(--cream);
    color: var(--forest);
    border: 0;
    padding: 18px 38px;
    border-radius: 999px;
    font-family: var(--font-ui);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 14px;
    transition: background 240ms;
  }
  .closing__cta:hover { background: var(--sand); }
  .closing__cta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bindu); }
  .closing__sub {
    margin-top: 18px;
    font-family: var(--font-editorial);
    font-style: italic;
    font-size: 14px;
    color: var(--sage);
  }
</style>
</head>
<body>

      <circle cx="42" cy="26" r="2.4" fill="#B4613A"/>
      <text x="52" y="38" font-family="Cormorant Garamond, serif" font-weight="500" font-size="30" fill="#14201A" letter-spacing="3">KAM</text>
