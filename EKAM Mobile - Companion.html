<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKAM Mobile — Companion · in-stay</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="ambient-ridge.css" />
<link rel="stylesheet" href="ekam-companion/styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&family=Raleway:wght@300;400;500&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ekam-companion/data.jsx"></script>
<script type="text/babel" src="ekam-companion/screens.jsx"></script>
<script type="text/babel" src="ekam-companion/app.jsx"></script>

<!-- ═════════════════════════════════════════════════════════════
     Tweakable controls — checkout & SKU stepper variations
     ═════════════════════════════════════════════════════════════ -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<div id="__tweaks-root"></div>
<script type="text/babel">
const COMP_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "checkoutMode": "instant",
  "ctaCopy": "checkout",
  "trayShape": "pill",
  "trayPosition": "above-tabs",
  "stepperStyle": "pill",
  "showRunningTotal": true,
  "freeItemsCountToTray": true,
  "celebrateOnFirstAdd": true
}/*EDITMODE-END*/;

const CTA_COPY = {
  'pay-now':    (n, t) => t > 0 ? `Pay now · ₹${t.toLocaleString('en-IN')}` : `Send order · gifted`,
  'place':      (n, t) => t > 0 ? `Place order · ₹${t.toLocaleString('en-IN')}` : `Place order · gifted`,
  'review':     (n, t) => t > 0 ? `Review (${n}) · ₹${t.toLocaleString('en-IN')}` : `Review · gifted`,
  'checkout':   (n, t) => t > 0 ? `Checkout · ₹${t.toLocaleString('en-IN')}` : `Send · on the house`,
};

function applyCompTweaks(t) {
  const root = document.documentElement;
  root.dataset.checkoutMode  = t.checkoutMode;
  root.dataset.trayShape     = t.trayShape;
  root.dataset.trayPosition  = t.trayPosition;
  root.dataset.stepperStyle  = t.stepperStyle;
  root.dataset.runningTotal  = t.showRunningTotal ? 'on' : 'off';
  root.dataset.freeCounts    = t.freeItemsCountToTray ? 'on' : 'off';
  root.dataset.celebrate     = t.celebrateOnFirstAdd ? 'on' : 'off';
  root.dataset.ctaCopy       = t.ctaCopy;

  // Rewrite the live tray CTA copy whenever a tweak changes
  const tray = document.querySelector('.tray');
  const cta  = document.querySelector('.tray__cta');
  if (tray && cta) {
    const total = parseInt(tray.querySelector('.tray__total')?.textContent.replace(/[^0-9]/g, ''), 10) || 0;
    const count = parseInt(tray.querySelector('.tray__count')?.textContent.match(/^(\d+)/)?.[1], 10) || 0;
    cta.textContent = CTA_COPY[t.ctaCopy](count, total);
  }
}

function CompTweaksApp() {
  const [t, setTweak] = window.useTweaks(COMP_TWEAK_DEFAULTS);
  React.useEffect(() => { applyCompTweaks(t); }, [t]);
  return (
    <window.TweaksPanel title="Tweaks · Companion">
      <window.TweakSection label="Checkout flow">
        <window.TweakRadio
          label="Mode"
          value={t.checkoutMode}
          options={[
            { value: 'instant',   label: 'Pay instantly' },
            { value: 'review',    label: 'Review step' },
            { value: 'on-arrival', label: 'Pay later' },
          ]}
          onChange={(v) => setTweak('checkoutMode', v)}
        />
        <window.TweakSelect
          label="CTA copy"
          value={t.ctaCopy}
          options={[
            { value: 'pay-now',  label: 'Pay now · ₹X' },
            { value: 'place',    label: 'Place order · ₹X' },
            { value: 'review',   label: 'Review (3) · ₹X' },
            { value: 'checkout', label: 'Checkout · ₹X' },
          ]}
          onChange={(v) => setTweak('ctaCopy', v)}
        />
      </window.TweakSection>

      <window.TweakSection label="Floating tray">
        <window.TweakRadio
          label="Shape"
          value={t.trayShape}
          options={[
            { value: 'pill',   label: 'Pill' },
            { value: 'bar',    label: 'Full bar' },
            { value: 'card',   label: 'Card' },
          ]}
          onChange={(v) => setTweak('trayShape', v)}
        />
        <window.TweakRadio
          label="Position"
          value={t.trayPosition}
          options={[
            { value: 'above-tabs', label: 'Above tabs' },
            { value: 'over-tabs',  label: 'Replaces tabs' },
          ]}
          onChange={(v) => setTweak('trayPosition', v)}
        />
        <window.TweakToggle
          label="Show running total"
          value={t.showRunningTotal}
          onChange={(v) => setTweak('showRunningTotal', v)}
        />
        <window.TweakToggle
          label="Celebrate first add (haptic)"
          value={t.celebrateOnFirstAdd}
          onChange={(v) => setTweak('celebrateOnFirstAdd', v)}
        />
      </window.TweakSection>

      <window.TweakSection label="SKU stepper">
        <window.TweakRadio
          label="Style"
          value={t.stepperStyle}
          options={[
            { value: 'inline',   label: 'Inline − qty +' },
            { value: 'pill',     label: 'Pill cluster' },
            { value: 'floating', label: 'Tap → drawer' },
          ]}
          onChange={(v) => setTweak('stepperStyle', v)}
        />
        <window.TweakToggle
          label="Free items count to tray"
          value={t.freeItemsCountToTray}
          onChange={(v) => setTweak('freeItemsCountToTray', v)}
        />
      </window.TweakSection>
    </window.TweaksPanel>
  );
}

function bootCompTweaks() {
  if (typeof window.TweaksPanel === 'undefined' || typeof window.useTweaks === 'undefined') {
    return setTimeout(bootCompTweaks, 50);
  }
  applyCompTweaks(COMP_TWEAK_DEFAULTS);
  ReactDOM.createRoot(document.getElementById('__tweaks-root')).render(<CompTweaksApp />);
}
bootCompTweaks();
</script>

</body>
</html>
