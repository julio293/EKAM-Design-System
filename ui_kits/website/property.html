  @keyframes pbh-rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .pbh__close {
    position: absolute; top: 22px; right: 22px;
    background: transparent; border: 0; cursor: pointer;
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 2px; color: var(--moss);
    text-transform: uppercase; font-weight: 500;
    text-decoration: underline; text-underline-offset: 4px;
    z-index: 2;
  }
  .pbh__close:hover { color: var(--ink); }

  .pbh__top {
    padding: 44px 44px 28px;
    border-bottom: 1px solid var(--bone);
  }
  .pbh__eyebrow {
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 3px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
    display: block; margin-bottom: 14px;
  }
  .pbh__title {
    font-family: var(--font-display); font-size: 44px;
    color: var(--forest); font-weight: 400; letter-spacing: 0.2px;
    line-height: 1.08; margin: 0 0 14px;
    text-wrap: balance;
  }
  .pbh__title em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); }
  .pbh__sub {
    font-family: var(--font-editorial); font-style: italic;
    font-size: 16px; color: var(--ink); line-height: 1.55;
    max-width: 620px; margin: 0;
    text-wrap: pretty;
  }
  .pbh__code {
    display: inline-flex; align-items: baseline; gap: 10px;
    margin-top: 18px;
    padding: 8px 14px;
    background: var(--sand);
    border: 1px solid var(--bone);
  }
  .pbh__code-lbl {
    font-family: var(--font-ui); font-size: 9px;
    letter-spacing: 2px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .pbh__code-val {
    font-family: var(--font-display); font-size: 18px;
    color: var(--forest); font-weight: 400;
    letter-spacing: 1.5px;
    font-variant-numeric: tabular-nums;
  }

  .pbh__grid {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--bone);
  }
  .pbh__qrcard {
    padding: 32px 36px;
    border-right: 1px solid var(--bone);
    background: var(--sand);
    display: flex; flex-direction: column; gap: 22px;
  }
  .pbh__qrcard-lbl {
    font-family: var(--font-ui); font-size: 9px;
    letter-spacing: 2.5px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
    display: block; margin-bottom: 6px;
  }
  .pbh__qrcard-title {
    font-family: var(--font-display); font-size: 22px;
    color: var(--ink); font-weight: 400; letter-spacing: 0.3px;
    margin: 0;
  }
  .pbh__qrcard-title em { color: var(--moss); font-style: normal; }
  .pbh__qr {
    width: 160px; height: 160px;
    padding: 10px;
    background: var(--cream);
    border: 1px solid var(--bone);
    align-self: flex-start;
  }
  .pbh__qr-inner {
    width: 100%; height: 100%;
    background-color: var(--cream);
    background-image:
      linear-gradient(45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(-45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--ink) 75%),
      linear-gradient(-45deg, transparent 75%, var(--ink) 75%);
    background-size: 10px 10px;
    background-position: 0 0, 0 5px, 5px -5px, -5px 0;
    position: relative;
  }
  /* QR corner squares */
  .pbh__qr-inner::before,
  .pbh__qr-inner::after {
    content: ''; position: absolute;
    width: 22px; height: 22px;
    background: var(--cream); border: 4px solid var(--ink);
  }
  .pbh__qr-inner::before { top: 0; left: 0; }
  .pbh__qr-inner::after { top: 0; right: 0; }

  .pbh__badges { display: flex; gap: 10px; flex-wrap: wrap; }
  .pbh__badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--ink); color: var(--cream);
    padding: 10px 14px;
    text-decoration: none;
    transition: background 180ms;
  }
  .pbh__badge:hover { background: var(--forest); }
  .pbh__badge svg { width: 18px; height: 18px; color: var(--cream); fill: currentColor; }
  .pbh__badge span { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
  .pbh__badge small {
    font-family: var(--font-ui); font-size: 8.5px;
    letter-spacing: 1.5px; opacity: 0.7;
    text-transform: uppercase; font-weight: 500;
  }
  .pbh__badge b {
    font-family: var(--font-display); font-size: 15px;
    font-weight: 500; letter-spacing: 0.3px;
  }

  .pbh__benefits {
    padding: 32px 36px;
  }
  .pbh__benefits-lbl {
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 2.5px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
    display: block; margin-bottom: 18px;
  }
  .pbh__benefits-list {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 16px;
  }
  .pbh__benefits-list li {
    display: grid; grid-template-columns: 24px 1fr; gap: 14px;
    align-items: flex-start;
    padding-top: 14px;
    border-top: 1px solid var(--bone);
  }
  .pbh__benefits-list li:first-child { padding-top: 0; border-top: 0; }
  .pbh__benefit-num {
    font-family: var(--font-display); font-size: 16px;
    color: var(--bindu); font-weight: 400;
    line-height: 1.1; padding-top: 2px;
  }
  .pbh__benefits-list li div {
    display: flex; flex-direction: column; gap: 3px;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 13px; color: var(--moss); line-height: 1.5;
  }
  .pbh__benefits-list li b {
    font-family: var(--font-ui); font-style: normal; font-weight: 500;
    font-size: 12.5px; color: var(--ink);
    letter-spacing: 0.3px;
  }

  .pbh__foot {
    padding: 18px 36px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-ui); font-size: 12px;
    color: var(--moss); letter-spacing: 0.3px;
    gap: 16px; flex-wrap: wrap;
  }
  .pbh__foot b { color: var(--forest); font-weight: 500; }
  .pbh__cta {
    background: transparent; border: 1px solid var(--ink);
    color: var(--ink);
    padding: 10px 18px; border-radius: 999px;
    font-family: var(--font-ui); font-size: 10.5px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    cursor: pointer;
    transition: all 180ms;
  }
  .pbh__cta:hover { background: var(--ink); color: var(--cream); }

  @media (max-width: 760px) {
    .pbh { padding: 0; align-items: flex-end; }
    .pbh__panel { max-height: 96vh; border-radius: 22px 22px 0 0; }
    .pbh__top { padding: 32px 22px 22px; }
    .pbh__title { font-size: 30px; }
    .pbh__sub { font-size: 14.5px; }
    .pbh__grid { grid-template-columns: 1fr; }
    .pbh__qrcard { border-right: 0; border-bottom: 1px solid var(--bone); padding: 24px 22px; }
    .pbh__benefits { padding: 24px 22px; }
    .pbh__foot { padding: 14px 22px; flex-direction: column; align-items: flex-start; }
  }

  /* =============== CLOSING CTA =============== */
  .close {
    background: var(--ink); color: var(--cream);
    padding: 140px 32px 100px;
    position: relative; overflow: hidden;
    text-align: center;
  }
  .close::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 110%, rgba(43,70,48,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 65% 40%, rgba(214,135,99,0.08) 0%, transparent 50%);
  }
  .close__inner { position: relative; z-index: 5; max-width: 700px; margin: 0 auto; }
  .close__dev { font-family: var(--font-devanagari); font-size: 32px; color: var(--bindu); letter-spacing: 2px; margin-bottom: 18px; }
  .close__rule { width: 48px; height: 1px; background: var(--bindu); margin: 0 auto 32px; }
  .close__title { font-family: var(--font-display); font-style: italic; font-weight: 300; font-size: 56px; color: var(--cream); line-height: 1.1; margin-bottom: 28px; }
  .close__cta { background: var(--cream); color: var(--forest); border: 0; padding: 18px 38px; border-radius: 999px; font-family: var(--font-ui); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: background 240ms; display: inline-flex; align-items: center; gap: 14px; }
  .close__cta:hover { background: var(--sand); }
  .close__cta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bindu); }
  .close__sub { margin-top: 18px; font-family: var(--font-editorial); font-style: italic; font-size: 14px; color: var(--sage); }

  /* =============== LEAFLET MARKERS =============== */
  .ekam-marker { background: transparent !important; border: 0 !important; }
  .em-dot {
    display: block; width: 14px; height: 14px;
    border-radius: 50%; background: var(--bindu);
    border: 2px solid var(--cream);
    box-shadow: 0 2px 6px rgba(20,32,26,0.4);
    position: relative; left: -3px; top: -3px;
  }
  .leaflet-container { background: var(--sand) !important; }
  .leaflet-control-attribution { background: rgba(250,247,240,0.85) !important; font-family: var(--font-ui) !important; font-size: 9px !important; }

  /* =============== GALLERY MODAL =============== */
  .gallery-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(20, 32, 26, 0.92);
    display: flex; flex-direction: column;
    padding: 32px;
    opacity: 0; pointer-events: none;
    transition: opacity 320ms var(--ease-arrive);
  }
  .gallery-overlay.on { opacity: 1; pointer-events: auto; }
  .gallery-overlay__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; color: var(--cream); }
  .gallery-overlay__title { font-family: var(--font-display); font-size: 22px; font-style: italic; font-weight: 400; }
  .gallery-overlay__close { background: transparent; border: 0; cursor: pointer; color: var(--cream); font-family: var(--font-ui); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; padding: 8px 14px; }
  .gallery-overlay__close:hover { color: var(--bindu); }
  .gallery-overlay__grid {
    flex: 1; overflow-y: auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding-right: 12px;
  }
  .gallery-overlay__tile { aspect-ratio: 4 / 3; }

  /* =============== MOBILE HERO CAROUSEL =============== */
  .mhero { display: none; }
  @media (max-width: 760px) {
    .hero-grid { display: none; }
    .gallery-cta { display: none; }
    .mhero {
      display: block;
      position: relative;
      margin: 0;
    }
    /* Category strip above carousel */
    .mhero__tabs {
      display: flex; gap: 8px;
      padding: 14px 18px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: var(--cream);
    }
    .mhero__tabs::-webkit-scrollbar { display: none; }
    .mhero__tab {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--bone);
      padding: 8px 14px;
      font-family: var(--font-ui); font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--moss); font-weight: 500;
      cursor: pointer;
      transition: all 200ms var(--ease-quiet);
      border-radius: 999px;
    }
    .mhero__tab.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    /* Scroll-snap carousel */
    .mhero__rail {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }
    .mhero__rail::-webkit-scrollbar { display: none; }
    .mhero__slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      aspect-ratio: 4 / 5;
      position: relative;
      background: var(--mist);
    }
    /* Overlay chips on the slide */
    .mhero__counter {
      position: absolute; left: 16px; bottom: 16px;
      background: rgba(20,32,26,0.55);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      color: var(--cream);
      font-family: var(--font-ui); font-size: 11px;
      letter-spacing: 1.5px; font-weight: 500;
      padding: 6px 12px; border-radius: 999px;
      pointer-events: none;
    }
    .mhero__viewall {
      position: absolute; right: 16px; bottom: 16px;
      background: var(--cream); color: var(--ink);
      border: 0; padding: 8px 14px; border-radius: 999px;
      font-family: var(--font-ui); font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .mhero__dots {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 16px;
      display: flex; gap: 5px;
      pointer-events: none;
    }
    .mhero__dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      transition: all 280ms var(--ease-quiet);
    }
    .mhero__dot.on { background: var(--cream); width: 16px; border-radius: 4px; }

    .header { padding: 24px 18px 18px; }
    .header__title { font-size: clamp(40px, 12vw, 56px); }
    .header__meta { font-size: 12px; gap: 10px; }
    .header__actions { gap: 8px; }
    .header__action { padding: 8px 12px; font-size: 11px; }

    .highlights { padding: 14px 18px; }
    .highlights__inner { gap: 8px; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
    .highlights__inner::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; font-size: 11px; padding: 8px 12px; }

    .main { padding: 24px 18px 0; gap: 0; }
    .left section { padding: 28px 0; }
    .sec-title { font-size: 32px; }
  }

  /* =============== MOBILE FULLSCREEN GALLERY =============== */
  .mgal {
    position: fixed; inset: 0; z-index: 220;
    background: #0a120e;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 280ms var(--ease-arrive);
  }
  .mgal.on { opacity: 1; pointer-events: auto; }
  .mgal__top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
    color: var(--cream);
    padding-top: max(14px, env(safe-area-inset-top));
  }
  .mgal__close, .mgal__share {
    background: rgba(255,255,255,0.1);
    border: 0; width: 36px; height: 36px; border-radius: 50%;
    color: var(--cream); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .mgal__title {
    font-family: var(--font-ui); font-size: 12px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
  }
  .mgal__rail {
    flex: 1;
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    align-items: center;
  }
  .mgal__rail::-webkit-scrollbar { display: none; }
  .mgal__slide {
    flex: 0 0 100%;
    scroll-snap-align: center;
    height: 100%;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
    display: flex; align-items: center; justify-content: center;
  }
  .mgal__caption {
    text-align: center;
    color: var(--cream);
    padding: 14px 24px;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 14px; line-height: 1.5;
    min-height: 64px;
  }
  .mgal__cats {
    display: flex; gap: 8px;
    padding: 0 16px 18px;
    padding-bottom: max(18px, env(safe-area-inset-bottom));
    overflow-x: auto;
    scrollbar-width: none;
  }
  .mgal__cats::-webkit-scrollbar { display: none; }
  .mgal__cat {
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    border: 0;
    color: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--font-ui); font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
    cursor: pointer;
    transition: all 200ms var(--ease-quiet);
  }
  .mgal__cat.on { background: var(--cream); color: var(--ink); }

  /* =============== MOBILE BOOKING SHEET (replaces sticky bar) =============== */
  .mbook-bar {
    display: none;
  }
  @media (max-width: 1024px) {
    /* Hide the desktop sidebar card entirely on mobile in v3 */
    .book { display: none !important; }
    .main { padding-bottom: 96px; }

    .mbook-bar {
      display: flex;
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 60;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: var(--cream);
      border-top: 1px solid var(--bone);
      box-shadow: 0 -10px 28px rgba(20,32,26,0.10);
    }
    .mbook-bar__handle {
      position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 3px; border-radius: 2px; background: var(--bone);
    }
    .mbook-bar__price {
      display: flex; flex-direction: column; gap: 1px;
      flex: 1;
    }
    .mbook-bar__price b {
      font-family: var(--font-display); font-size: 22px; color: var(--forest); font-weight: 400;
    }
    .mbook-bar__price span {
      font-family: var(--font-editorial); font-style: italic;
      font-size: 12px; color: var(--moss);
    }
    .mbook-bar__price s {
      text-decoration: none; color: var(--moss);
      font-family: var(--font-ui); font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .mbook-bar__cta {
      background: var(--bindu); color: var(--cream); border: 0;
      padding: 13px 22px; border-radius: 999px;
      font-family: var(--font-ui); font-size: 11.5px;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
      cursor: pointer;
    }
  }

  /* Sheet itself */
  .mbook-sheet {
    position: fixed; inset: 0; z-index: 120;
    pointer-events: none;
  }
  .mbook-sheet__scrim {
    position: absolute; inset: 0;
    background: rgba(20,32,26,0.4);
    opacity: 0;
    transition: opacity 320ms var(--ease-arrive);
  }
  .mbook-sheet.on { pointer-events: auto; }
  .mbook-sheet.on .mbook-sheet__scrim { opacity: 1; }
  .mbook-sheet__panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--cream);
    border-top-left-radius: 22px; border-top-right-radius: 22px;
    transform: translateY(100%);
    transition: transform 380ms cubic-bezier(0.22, 0.68, 0.16, 1);
    max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 -16px 40px rgba(20,32,26,0.22);
    overflow: hidden;
  }
  .mbook-sheet.on .mbook-sheet__panel { transform: translateY(0); }
  .mbook-sheet__handle {
    align-self: center;
    width: 40px; height: 4px;
    background: var(--bone); border-radius: 3px;
    margin: 10px 0 4px;
    flex-shrink: 0;
  }
  .mbook-sheet__top {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 22px 14px;
    border-bottom: 1px solid var(--bone);
    flex-shrink: 0;
  }
  .mbook-sheet__title {
    font-family: var(--font-display); font-size: 22px; color: var(--ink);
    font-weight: 400; letter-spacing: 0.3px;
  }
  .mbook-sheet__title em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); font-size: 14px; margin-left: 6px; }
  .mbook-sheet__close {
    background: transparent; border: 0; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--moss); font-size: 18px;
  }
  .mbook-sheet__close:active { background: var(--sand); }

  .mbook-sheet__body {
    flex: 1; overflow-y: auto;
    padding: 18px 22px 22px;
    display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch;
  }

  /* Date rows */
  .mbook-dates {
    display: grid; grid-template-columns: 1fr 1fr;
    border: 1px solid var(--bone);
    margin-bottom: 12px;
  }
  .mbook-dates__cell {
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 2px;
    cursor: pointer;
  }
  .mbook-dates__cell:first-child { border-right: 1px solid var(--bone); }
  .mbook-dates__cell:active { background: var(--sand); }
  .mbook-dates__lbl {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
  }
  .mbook-dates__val {
    font-family: var(--font-ui); font-size: 14px; color: var(--ink); font-weight: 400;
  }

  /* Inline mini calendar (preview) */
  .mbook-cal {
    border: 1px solid var(--bone);
    border-top: 0;
    padding: 14px;
    background: var(--cream);
    animation: cal-in 280ms var(--ease-arrive);
    margin-bottom: 12px;
  }
  @keyframes cal-in { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 400px; } }
  .mbook-cal__head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .mbook-cal__month {
    font-family: var(--font-display); font-size: 17px; color: var(--ink);
  }
  .mbook-cal__navs { display: flex; gap: 6px; }
  .mbook-cal__navs button {
    width: 30px; height: 30px; border: 1px solid var(--bone);
    background: transparent; border-radius: 50%; cursor: pointer;
    color: var(--ink); font-size: 14px;
  }
  .mbook-cal__navs button:active { background: var(--sand); }
  .mbook-cal__weekrow {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    margin-bottom: 6px;
  }
  .mbook-cal__weekrow span {
    text-align: center;
    font-family: var(--font-ui); font-size: 10px; letter-spacing: 1px;
    color: var(--moss); text-transform: uppercase;
  }
  .mbook-cal__grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .mbook-cal__day {
    aspect-ratio: 1;
    background: transparent;
    border: 0;
    font-family: var(--font-ui); font-size: 13px; color: var(--ink);
    cursor: pointer;
    border-radius: 4px;
    position: relative;
  }
  .mbook-cal__day:active { background: var(--sand); }
  .mbook-cal__day.muted { color: var(--mist); cursor: default; }
  .mbook-cal__day.in-range { background: var(--sand); border-radius: 0; }
  .mbook-cal__day.range-start { background: var(--ink); color: var(--cream); border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .mbook-cal__day.range-end { background: var(--ink); color: var(--cream); border-top-left-radius: 0; border-bottom-left-radius: 0; }

  /* Guest row in sheet (collapsed pill) */
  .mbook-guest {
    border: 1px solid var(--bone);
    padding: 12px 14px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    margin-bottom: 14px;
  }
  .mbook-guest:active { background: var(--sand); }
  .mbook-guest__lbl {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
    display: flex; justify-content: space-between; align-items: center;
  }
  .mbook-guest__chev {
    color: var(--moss); font-size: 11px; transition: transform 200ms;
  }
  .mbook-guest.open .mbook-guest__chev { transform: rotate(180deg); color: var(--bindu); }
  .mbook-guest__val {
    font-family: var(--font-ui); font-size: 14px; color: var(--ink); font-weight: 400;
  }

  /* Mobile guest panel (inside sheet, accordion) */
  .mbook-gpanel {
    border: 1px solid var(--bone);
    border-top: 0;
    background: var(--cream);
    overflow: hidden;
    margin-bottom: 14px;
    margin-top: -14px;
    animation: gpanel-in 320ms var(--ease-arrive);
  }
  @keyframes gpanel-in { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 800px; } }
  .mbook-gpanel__row {
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--bone);
  }
  .mbook-gpanel__row:last-of-type { border-bottom: 0; }
  .mbook-gpanel__name {
    font-family: var(--font-display); font-size: 17px; color: var(--ink); font-weight: 400;
  }
  .mbook-gpanel__meta {
    font-family: var(--font-editorial); font-style: italic; font-size: 12.5px; color: var(--moss);
    margin-top: 2px;
  }
  .mbook-gpanel__meta .pill {
    display: inline-block; margin-left: 6px;
    padding: 1px 7px; background: var(--bone); color: var(--forest);
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; font-style: normal; font-weight: 500;
  }
  .mbook-gpanel__meta .pill.bindu { background: var(--bindu); color: var(--cream); }
  .mbook-gpanel__step {
    display: flex; align-items: center; gap: 14px;
  }
  .mbook-gpanel__step button {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--ink); background: transparent;
    color: var(--ink); font-size: 18px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 180ms;
  }
  .mbook-gpanel__step button:active { background: var(--ink); color: var(--cream); transform: scale(0.96); }
  .mbook-gpanel__step button:disabled { border-color: var(--mist); color: var(--mist); }
  .mbook-gpanel__step-val {
    font-family: var(--font-display); font-size: 19px; color: var(--forest);
    min-width: 22px; text-align: center;
  }
  .mbook-gpanel__ages {
    padding: 14px 16px;
    background: var(--sand);
    border-top: 1px solid var(--bone);
    border-bottom: 1px solid var(--bone);
  }
  .mbook-gpanel__ages-lbl {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
    display: block; margin-bottom: 10px;
  }
  .mbook-gpanel__ages-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .mbook-gpanel__age {
    background: var(--cream); border: 1px solid var(--bone);
    padding: 9px 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .mbook-gpanel__age.unset { border-color: var(--bindu); }
  .mbook-gpanel__age-lbl {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 1.5px;
    color: var(--moss); text-transform: uppercase; font-weight: 500;
  }
  .mbook-gpanel__age.unset .mbook-gpanel__age-lbl { color: var(--bindu); }
  .mbook-gpanel__age select {
    border: 0; background: transparent; padding: 0;
    font-family: var(--font-ui); font-size: 14px; color: var(--ink);
    outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;
  }

  /* Smart card inside sheet */
  .mbook-smart {
    background: var(--sand);
    border-left: 2px solid var(--bindu);
    padding: 14px 16px;
    margin-bottom: 14px;
    animation: smart-in 280ms var(--ease-arrive);
  }
  @keyframes smart-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .mbook-smart__lbl {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
    display: block; margin-bottom: 6px;
  }
  .mbook-smart__msg {
    font-family: var(--font-editorial); font-style: italic;
    font-size: 14px; color: var(--ink); line-height: 1.5;
  }
  .mbook-smart__actions {
    display: flex; gap: 16px; margin-top: 10px;
  }
  .mbook-smart__actions button {
    background: transparent; border: 0; padding: 0;
    font-family: var(--font-ui); font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
    color: var(--bindu); text-decoration: underline; text-underline-offset: 4px;
    cursor: pointer;
  }
  .mbook-smart__actions button.alt { color: var(--moss); }

  /* Trust strip */
  .mbook-trust {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    background: transparent;
    border: 1px solid var(--bone);
    font-family: var(--font-ui); font-size: 12px;
    color: var(--ink); letter-spacing: 0.2px;
  }
  .mbook-trust svg { width: 16px; height: 16px; stroke: var(--bindu); stroke-width: 1.6; fill: none; flex-shrink: 0; }
  .mbook-trust b { color: var(--forest); font-weight: 500; }

  /* Breakdown */
  .mbook-breakdown { padding: 4px 0 8px; }
  .mbook-breakdown .line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0;
    font-family: var(--font-ui); font-size: 13px; color: var(--ink); font-weight: 300;
  }
  .mbook-breakdown .line.sm { font-size: 11px; color: var(--moss); }
  .mbook-breakdown .line.save { color: var(--bindu); font-weight: 500; }
  .mbook-breakdown .line.total {
    margin-top: 10px; padding-top: 12px; border-top: 1px solid var(--bone);
    font-family: var(--font-display); font-size: 22px; color: var(--forest); font-weight: 400;
  }

  /* Sheet footer pinned */
  .mbook-sheet__foot {
    flex-shrink: 0;
    padding: 14px 22px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    background: var(--cream);
    border-top: 1px solid var(--bone);
  }
  .mbook-sheet__cta {
    width: 100%;
    background: var(--bindu); color: var(--cream); border: 0;
    padding: 16px 24px; border-radius: 999px;
    font-family: var(--font-ui); font-size: 12px;
    letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500;
    cursor: pointer;
  }
  .mbook-sheet__cta:disabled { background: var(--moss); opacity: 0.6; }
  .mbook-sheet__hint {
    text-align: center; margin-top: 8px;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 12px; color: var(--moss);
  }
  .mbook-sheet__urgency {
    text-align: center;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 12.5px; color: var(--moss);
    padding: 0 0 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .mbook-sheet__urgency .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--bindu);
    animation: book-pulse 2.4s var(--ease-quiet) infinite;
  }

  /* =============== REAL DATE PICKER (mobile, in sheet) =============== */
  .mdp { margin-bottom: 14px; border: 1px solid var(--bone); background: var(--cream); }
  .mdp__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--bone);
  }
  .mdp__head-left { display: flex; flex-direction: column; gap: 2px; }
  .mdp__head-lbl { font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px; color: var(--bindu); text-transform: uppercase; font-weight: 500; }
  .mdp__head-val { font-family: var(--font-ui); font-size: 13px; color: var(--ink); }
  .mdp__head-val em { font-style: normal; color: var(--moss); }
  .mdp__head-clear {
    background: transparent; border: 0;
    font-family: var(--font-ui); font-size: 10px; letter-spacing: 1.5px;
    color: var(--moss); text-transform: uppercase; font-weight: 500;
    text-decoration: underline; text-underline-offset: 4px;
    cursor: pointer;
  }
  .mdp__scroll {
    max-height: 360px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px 6px;
  }
  .mdp__month + .mdp__month { margin-top: 18px; }
  .mdp__month-title {
    font-family: var(--font-display); font-size: 16px; color: var(--ink);
    margin-bottom: 10px;
  }
  .mdp__weekrow {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    margin-bottom: 4px;
  }
  .mdp__weekrow span {
    text-align: center;
    font-family: var(--font-ui); font-size: 10px; letter-spacing: 1px;
    color: var(--moss); text-transform: uppercase;
  }
  .mdp__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .mdp__day {
    aspect-ratio: 1;
    background: transparent; border: 0;
    font-family: var(--font-ui); font-size: 13px; color: var(--ink);
    cursor: pointer; padding: 0;
    position: relative;
    transition: background 140ms;
  }
  .mdp__day:active { background: var(--sand); }
  .mdp__day.muted { color: var(--mist); cursor: default; pointer-events: none; }
  .mdp__day.past { color: var(--mist); cursor: not-allowed; opacity: 0.5; text-decoration: line-through; }
  .mdp__day.in-range { background: var(--sand); border-radius: 0; }
  .mdp__day.range-start { background: var(--ink); color: var(--cream); border-radius: 999px 0 0 999px; }
  .mdp__day.range-end { background: var(--ink); color: var(--cream); border-radius: 0 999px 999px 0; }
  .mdp__day.range-start.range-end { border-radius: 999px; }
  .mdp__day.preview { background: var(--bone); border-radius: 0; }
  .mdp__day.preview-end { background: var(--moss); color: var(--cream); border-radius: 0 999px 999px 0; }
  .mdp__hint {
    text-align: center;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 12px; color: var(--moss);
    padding: 0 14px 12px;
  }

  /* =============== EXPERIENCE UPSELLS (in sheet) =============== */
  .mxp {
    margin-bottom: 16px;
  }
  .mxp__head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .mxp__title {
    font-family: var(--font-display); font-size: 18px; color: var(--ink); font-weight: 400;
  }
  .mxp__title em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); font-size: 12px; margin-left: 8px; letter-spacing: 0.5px; }
  .mxp__toggle {
    background: transparent; border: 0;
    font-family: var(--font-ui); font-size: 10px; letter-spacing: 1.5px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
    text-decoration: underline; text-underline-offset: 4px;
    cursor: pointer;
  }
  .mxp__rail {
    display: flex; gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin: 0 -22px;
    padding: 0 22px 4px;
  }
  .mxp__rail::-webkit-scrollbar { display: none; }
  .mxp__card {
    flex: 0 0 200px;
    background: var(--cream);
    border: 1px solid var(--bone);
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: all 200ms var(--ease-quiet);
    overflow: hidden;
  }
  .mxp__card.on { border-color: var(--bindu); background: var(--sand); }
  .mxp__card-img {
    aspect-ratio: 4 / 3;
    background: var(--mist);
    position: relative;
  }
  .mxp__card-tag {
    position: absolute; left: 8px; top: 8px;
    background: rgba(20,32,26,0.72);
    color: var(--cream);
    padding: 4px 8px;
    font-family: var(--font-ui); font-size: 9px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }
  .mxp__card-check {
    position: absolute; right: 8px; top: 8px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--cream); border: 1px solid var(--bone);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-ui); font-size: 12px; color: transparent;
    transition: all 180ms;
  }
  .mxp__card.on .mxp__card-check {
    background: var(--bindu); border-color: var(--bindu); color: var(--cream);
  }
  .mxp__card-body {
    padding: 10px 12px 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .mxp__card-name {
    font-family: var(--font-display); font-size: 15px; color: var(--ink); font-weight: 400;
    line-height: 1.3;
  }
  .mxp__card-desc {
    font-family: var(--font-editorial); font-style: italic;
    font-size: 11.5px; color: var(--moss); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .mxp__card-price {
    margin-top: 4px;
    font-family: var(--font-ui); font-size: 11px; color: var(--bindu);
    letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
  }
  .mxp__card-price.free { color: var(--forest); }

  /* Experience thumbs (use existing g1..g6 textures since we don't have e-images yet) */
  .e1 { background-color: #4a3b2c; background-image: linear-gradient(160deg, #3a2b1c 0%, #6b4a30 60%, #c9853c 100%); }
  .e2 { background-color: #5a4630; background-image: linear-gradient(140deg, #443120 0%, #846040 70%, #d4a574 100%); }
  .e3 { background-color: #6b5a44; background-image: linear-gradient(150deg, #5a4a36 0%, #8a7558 100%); }
  .e4 { background-color: #3d4a36; background-image: linear-gradient(170deg, #2a3526 0%, #4d6443 70%, #8a9d75 100%); }
  .e5 { background-color: #1f2a25; background-image: linear-gradient(180deg, #0e1612 0%, #2a3d35 60%, #6b8275 100%); }
  .e6 { background-color: #14201A; background-image: radial-gradient(circle at 30% 40%, #2a3d35 0%, #0e1612 70%); }
  .e7 { background-color: #c7b9a0; background-image: linear-gradient(160deg, #f3ecd9 0%, #d4c5a4 70%, #a39378 100%); }

  /* =============== APP DOWNLOAD SECTION (in-page, brand-aligned) =============== */
  .appdl {
    background: var(--sand);
    padding: 48px 44px;
    margin: 28px 0 0;
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 56px;
    align-items: center;
    border: 1px solid var(--bone);
    position: relative;
  }
  .appdl__body {}
  .appdl__eyebrow {
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 2.5px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
    margin-bottom: 12px; display: block;
  }
  .appdl__title {
    font-family: var(--font-display); font-size: 36px;
    color: var(--forest); font-weight: 400;
    line-height: 1.18; letter-spacing: 0.2px;
    margin-bottom: 14px;
    text-wrap: balance;
  }
  .appdl__title em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); }
  .appdl__sub {
    font-family: var(--font-editorial); font-style: italic;
    font-size: 16px; color: var(--moss); line-height: 1.55;
    max-width: 520px;
    margin-bottom: 22px;
  }
  .appdl__sub b { color: var(--ink); font-style: normal; font-family: var(--font-ui); font-weight: 500; letter-spacing: 0.3px; font-size: 13px; }
  .appdl__features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 36px;
    margin-bottom: 24px;
    max-width: 520px;
    padding-top: 22px;
    border-top: 1px solid var(--bone);
  }
  .appdl__feature {
    display: flex; flex-direction: column; gap: 4px;
  }
  .appdl__feature-name {
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 1.8px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .appdl__feature-sub {
    font-family: var(--font-editorial); font-style: italic;
    font-size: 13px; color: var(--ink); line-height: 1.45;
  }
  .appdl__badges { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .appdl__badge {
    background: var(--ink); color: var(--cream);
    padding: 10px 16px; border: 0; border-radius: 0;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background 180ms;
    text-decoration: none;
  }
  .appdl__badge:hover { background: var(--forest); }
  .appdl__badge svg { width: 18px; height: 18px; fill: var(--cream); }
  .appdl__badge-text { display: flex; flex-direction: column; gap: 0; text-align: left; line-height: 1.1; }
  .appdl__badge-text small { font-size: 8.5px; opacity: 0.7; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font-ui); font-weight: 500; }
  .appdl__badge-text b { font-family: var(--font-display); font-size: 15px; font-weight: 500; letter-spacing: 0.3px; }
  .appdl__qr-row {
    margin-left: 4px;
    display: flex; gap: 12px; align-items: center;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 12px; color: var(--moss);
    padding-left: 14px;
    border-left: 1px solid var(--bone);
  }
  .appdl__qr {
    width: 52px; height: 52px;
    background: var(--cream);
    padding: 4px;
    border: 1px solid var(--bone);
    flex-shrink: 0;
  }
  .appdl__qr-inner {
    width: 100%; height: 100%;
    background-color: var(--cream);
    background-image:
      linear-gradient(45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(-45deg, var(--ink) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--ink) 75%),
      linear-gradient(-45deg, transparent 75%, var(--ink) 75%);
    background-size: 5px 5px;
    background-position: 0 0, 0 2.5px, 2.5px -2.5px, -2.5px 0px;
  }

  /* Right column — phone mockup, compact */
  .appdl__phone {
    width: 200px;
    aspect-ratio: 9 / 17;
    background: var(--ink);
    border-radius: 26px;
    padding: 6px;
    box-shadow: 0 12px 28px rgba(20,32,26,0.18);
    justify-self: end;
    position: relative;
  }
  .appdl__phone-inner {
    width: 100%; height: 100%;
    background: var(--cream);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    padding: 26px 12px 12px;
    gap: 10px;
  }
  .appdl__phone-notch {
    position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 16px; background: var(--ink);
    border-radius: 0 0 9px 9px;
    z-index: 2;
  }
  .appdl__phone-eyebrow {
    font-family: var(--font-ui); font-size: 7.5px;
    letter-spacing: 1.5px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .appdl__phone-title {
    font-family: var(--font-display); font-size: 14px;
    color: var(--ink); font-weight: 400; line-height: 1.2;
  }
  .appdl__phone-title em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); font-size: 11px; }
  .appdl__phone-card {
    background: var(--sand);
    border-left: 2px solid var(--bindu);
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .appdl__phone-card-lbl {
    font-family: var(--font-ui); font-size: 6.5px;
    letter-spacing: 1px; color: var(--bindu);
    text-transform: uppercase; font-weight: 500;
  }
  .appdl__phone-card-val {
    font-family: var(--font-display); font-size: 16px;
    color: var(--forest); font-weight: 400; letter-spacing: 1px;
  }
  .appdl__phone-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--bone);
    font-family: var(--font-ui); font-size: 9px;
    color: var(--ink);
  }
  .appdl__phone-row:last-of-type { border-bottom: 0; }
  .appdl__phone-row span { color: var(--moss); letter-spacing: 0.4px; }
  .appdl__phone-row b { font-family: var(--font-ui); font-weight: 500; color: var(--ink); }
  .appdl__phone-cta {
    margin-top: auto;
    background: var(--bindu); color: var(--cream);
    padding: 8px 0; text-align: center;
    border-radius: 999px;
    font-family: var(--font-ui); font-size: 8px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }

  @media (max-width: 900px) {
    .appdl { grid-template-columns: 1fr; padding: 32px 22px; gap: 28px; margin: 0; }
    .appdl__phone { display: none; }
    .appdl__title { font-size: 28px; }
    .appdl__sub { font-size: 14px; }
    .appdl__features { grid-template-columns: 1fr; gap: 12px; }
    .appdl__qr-row { display: none; }
  }

  /* =============== APP DOWNLOAD NUDGE =============== */
  .mappn {
    background: linear-gradient(135deg, var(--forest) 0%, #0f1a14 100%);
    color: var(--cream);
    padding: 18px 18px;
    margin-bottom: 16px;
    display: flex; gap: 14px; align-items: center;
    position: relative;
    overflow: hidden;
  }
  .mappn::before {
    content: '';
    position: absolute; right: -30px; top: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,97,58,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .mappn__icon {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 12px;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 24px; color: var(--forest); font-weight: 500;
    position: relative;
  }
  .mappn__icon .dot { position: absolute; right: 8px; top: 14px; width: 4px; height: 4px; border-radius: 50%; background: var(--bindu); }
  .mappn__body { flex: 1; }
  .mappn__lbl { font-family: var(--font-ui); font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 500; margin-bottom: 3px; display: block; }
  .mappn__title { font-family: var(--font-display); font-size: 17px; color: var(--cream); line-height: 1.3; }
  .mappn__sub { font-family: var(--font-editorial); font-style: italic; font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .mappn__badges { display: flex; gap: 8px; margin-top: 12px; }
  .mappn__badge {
    background: var(--cream); color: var(--ink);
    padding: 8px 12px; border: 0; border-radius: 8px;
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 1px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .mappn__badge svg { width: 16px; height: 16px; fill: var(--ink); }
  .mappn__badge b { font-family: var(--font-display); font-size: 13px; font-weight: 500; letter-spacing: 0.3px; }
  .mappn__dismiss {
    position: absolute; right: 10px; top: 10px;
    background: transparent; border: 0;
    color: rgba(255,255,255,0.5); font-size: 16px; cursor: pointer;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .mappn__dismiss:active { background: rgba(255,255,255,0.1); }

  /* Compact app-row variant (sits in mbook-sheet__foot) */
  .mapp-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 14px;
    border-bottom: 1px dashed var(--bone);
    margin-bottom: 12px;
  }
  .mapp-row__txt {
    flex: 1;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 12.5px; color: var(--moss); line-height: 1.4;
  }
  .mapp-row__txt b { color: var(--ink); font-style: normal; font-family: var(--font-ui); font-weight: 500; letter-spacing: 0.3px; }
  .mapp-row__cta {
    background: transparent; border: 1px solid var(--ink);
    color: var(--ink); padding: 7px 12px;
    font-family: var(--font-ui); font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
    cursor: pointer; border-radius: 999px;
  }
  .mapp-row__cta:active { background: var(--ink); color: var(--cream); }

  /* =============== BOTTOM TAB NAV (mobile shell) =============== */
  @media (max-width: 1024px) {
    .mbook-bar { bottom: 56px; padding-bottom: 12px; } /* lift above bottom nav */
    .main { padding-bottom: 156px; } /* extra room for nav + bar */
  }
  .mtab {
    display: none;
  }
  @media (max-width: 1024px) {
    .mtab {
      display: flex;
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 55;
      background: var(--cream);
      border-top: 1px solid var(--bone);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mtab__btn {
      flex: 1; background: transparent; border: 0;
      padding: 8px 0 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer;
      color: var(--moss);
      transition: color 180ms;
      position: relative;
    }
    .mtab__btn svg {
      width: 22px; height: 22px;
      stroke: currentColor; fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }
    .mtab__btn span {
      font-family: var(--font-ui); font-size: 9px;
      letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
    }
    .mtab__btn.on { color: var(--ink); }
    .mtab__btn.on::after {
      content: ''; position: absolute; top: 0; left: 50%;
      width: 24px; height: 2px;
      background: var(--bindu);
      transform: translateX(-50%);
    }
    .mtab__btn-badge {
      position: absolute; top: 4px; right: calc(50% - 18px);
      min-width: 14px; height: 14px; padding: 0 4px;
      border-radius: 999px;
      background: var(--bindu); color: var(--cream);
      font-family: var(--font-ui); font-size: 9px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }
  }

  /* Tab pages (Saved, Itinerary etc) — slide-in overlay */
  .mtab-page {
    position: fixed; inset: 0 0 56px 0;
    background: var(--cream);
    z-index: 50;
    transform: translateX(100%);
    transition: transform 320ms var(--ease-arrive);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mtab-page.on { transform: translateX(0); }
  .mtab-page__top {
    padding: 18px 22px 14px;
    padding-top: max(18px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--bone);
    display: flex; flex-direction: column; gap: 4px;
  }
  .mtab-page__eyebrow {
    font-family: var(--font-ui); font-size: 9px; letter-spacing: 2.5px;
    color: var(--bindu); text-transform: uppercase; font-weight: 500;
  }
  .mtab-page__title {
    font-family: var(--font-display); font-size: 32px; color: var(--ink);
    font-weight: 400;
  }
  .mtab-page__title em { font-family: var(--font-editorial); font-style: italic; }
  .mtab-page__body { padding: 22px; }
  .mtab-page__quiet {
    text-align: center;
    padding: 60px 24px;
    font-family: var(--font-editorial); font-style: italic;
    font-size: 15px; color: var(--moss); line-height: 1.6;
  }
  .mtab-page__quiet svg {
    width: 36px; height: 36px;
    stroke: var(--mist); fill: none; stroke-width: 1.4;
    margin: 0 auto 18px; display: block;
  }
  .mtab-page__quiet b {
    color: var(--ink); font-family: var(--font-display); font-style: normal;
    font-size: 22px; font-weight: 400;
    display: block; margin-bottom: 8px;
  }

  /* Itinerary card */
  .itin {
    border: 1px solid var(--bone);
    background: var(--cream);
    padding: 18px;
  }
  .itin__head { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 14px; border-bottom: 1px solid var(--bone); margin-bottom: 14px; }
  .itin__name { font-family: var(--font-display); font-size: 22px; color: var(--ink); font-weight: 400; }
  .itin__name em { font-family: var(--font-editorial); font-style: italic; color: var(--bindu); font-size: 12px; margin-left: 6px; }
  .itin__status {
    font-family: var(--font-ui); font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    color: var(--moss);
    padding: 3px 8px; background: var(--sand);
  }
  .itin__row { display: flex; justify-content: space-between; padding: 6px 0; font-family: var(--font-ui); font-size: 12px; color: var(--ink); }
  .itin__row span:first-child { color: var(--moss); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; font-weight: 500; }
  .itin__total { margin-top: 12px; padding-top: 14px; border-top: 1px solid var(--bone); display: flex; justify-content: space-between; align-items: baseline; }
  .itin__total b { font-family: var(--font-display); font-size: 22px; color: var(--forest); font-weight: 400; }

  /* Saved card */
  .saved-card {
    display: grid; grid-template-columns: 96px 1fr;
    gap: 14px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .saved-card__img { aspect-ratio: 1; background: var(--mist); }
  .saved-card__body { display: flex; flex-direction: column; gap: 3px; }
  .saved-card__name { font-family: var(--font-display); font-size: 18px; color: var(--ink); font-weight: 400; }
  .saved-card__meta { font-family: var(--font-editorial); font-style: italic; font-size: 12px; color: var(--moss); }
  .saved-card__price { font-family: var(--font-ui); font-size: 12px; color: var(--ink); letter-spacing: 0.3px; margin-top: auto; }

  /* Hide mobile-only chrome at desktop widths */
  @media (min-width: 1025px) {
    .mbook-bar, .mbook-sheet, .mtab, .mtab-page { display: none !important; }
  }

  /* Print-friendly fallback */
  @media print {
    .nav, .book, .gallery-overlay, .mbook-bar, .mbook-sheet, .mgal, .mtab, .mtab-page { display: none !important; }
  }
</style>
</head>
