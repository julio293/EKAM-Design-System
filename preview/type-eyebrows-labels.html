<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EKAM · Eyebrows & Labels</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { height: 100%; }
  .stage { width: 700px; min-height: 240px; padding: 36px 48px; background: var(--cream); }
  .lockup { margin-bottom: 28px; }
  .eyebrow { font-family: var(--font-ui); font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--moss); margin-bottom: 12px; }
  .eyebrow.clay { color: var(--bindu); }
  .headline { font-family: var(--font-display); font-weight: 300; font-size: 32px; color: var(--forest); letter-spacing: 1px; line-height: 1.1; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--bone); padding-top: 18px; }
  .gx { padding: 6px 16px 6px 0; font-family: var(--font-ui); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; line-height: 1.4; }
  .gx b { font-family: var(--font-ui); font-size: 9.5px; letter-spacing: 1.5px; color: var(--moss); text-transform: uppercase; font-weight: 300; display: block; margin-top: 4px; letter-spacing: 1px; }
  .gx.moss { color: var(--moss); }
  .gx.clay { color: var(--bindu); }
  .gx.ink  { color: var(--ink); }
  .gx.onforest-bg { background: var(--forest); color: var(--moss-on-forest); padding: 12px 16px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="lockup">
      <div class="eyebrow clay">CHAPTER 02 · THE STRATEGIC FRAME</div>
      <h3 class="headline">One cabin. One wild. One you.</h3>
    </div>
    <div class="grid">
      <div class="gx moss">VOLUME XI · SPRING 2026<b>Inter 500 · 11 px · ls 4</b></div>
      <div class="gx clay">FIND YOUR EKAM<b>Bindu eyebrow · over CTA</b></div>
      <div class="gx ink">PRESSED BY HAND · DEPARTURE MORNING<b>Metadata · Ink</b></div>
      <div class="gx onforest-bg">EKAM KUTIR CHITKUL<b style="color:var(--sand);">On forest · moss-on-forest</b></div>
    </div>
  </div>
</body>
</html>
