<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EKAM · Tagline Row</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { height: 100%; }
  .stage { width: 700px; min-height: 260px; padding: 32px 48px; background: var(--cream); }
  .row { display: grid; grid-template-columns: 1fr 180px; gap: 28px; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--bone); }
  .row:last-child { border-bottom: 0; }
  .line { font-family: var(--font-display); font-weight: 300; font-size: 30px; color: var(--forest); letter-spacing: 1px; line-height: 1.15; }
  .line em { font-family: var(--font-editorial); font-style: italic; }
  .use { font-family: var(--font-ui); font-size: 10px; letter-spacing: 2.5px; color: var(--bindu); text-transform: uppercase; font-weight: 500; text-align: right; line-height: 1.5; }
</style>
</head>
<body>
  <div class="stage">
    <div class="row">
      <div class="line">Hospitality, <em>disguised</em> as solitude.</div>
      <div class="use">Master · Hero · Cover</div>
    </div>
    <div class="row">
      <div class="line">No two alike.</div>
      <div class="use">Signature · Terminus</div>
    </div>
    <div class="row">
      <div class="line">The most <em>considered.</em></div>
      <div class="use">Editorial · Competitive frame</div>
    </div>
  </div>
</body>
</html>
