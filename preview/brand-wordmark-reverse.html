<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EKAM · Wordmark Reverse</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { height: 100%; }
  .stage {
    width: 700px; min-height: 220px;
    padding: 40px 48px;
    display: flex; align-items: center; gap: 48px;
    background: var(--forest);
  }
  .mark { flex: 0 0 320px; }
  .mark svg { width: 100%; height: auto; display: block; }
  .meta { flex: 1; color: var(--sand); }
  .row { display: flex; gap: 18px; padding: 8px 0; font-family: var(--font-ui); font-size: 11px; letter-spacing: 1px; color: var(--moss-on-forest); border-top: 1px solid rgba(236,228,211,0.18); }
  .row:first-child { border-top: 0; }
  .row b { color: var(--cream); font-weight: 500; flex: 0 0 110px; letter-spacing: 2px; }
  .row span { flex: 1; font-weight: 300; line-height: 1.6; color: var(--sand); }
</style>
</head>
<body>
  <div class="stage">
    <div class="mark">
      <svg viewBox="0 0 600 200">
        <text x="60" y="160" font-family="Cormorant Garamond, serif" font-weight="400" font-size="150" fill="#FAF7F0" letter-spacing="10">E</text>
        <circle cx="200" cy="107" r="10" fill="#B4613A"/>
        <text x="240" y="160" font-family="Cormorant Garamond, serif" font-weight="400" font-size="150" fill="#FAF7F0" letter-spacing="10">KAM</text>
      </svg>
    </div>
    <div class="meta">
      <div class="row"><b>Fill</b><span>Cream #FAF7F0 on Forest #2B4630</span></div>
      <div class="row"><b>Bindu</b><span>Stays clay — always — never reversed</span></div>
      <div class="row"><b>Use</b><span>Dark sections · footers · ink covers</span></div>
      <div class="row"><b>Never</b><span>On photography without a 60–80% forest panel beneath</span></div>
    </div>
  </div>
</body>
</html>
